<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harsh Task 6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <img src="https://static.vecteezy.com/system/resources/thumbnails/026/721/193/small/washing-machine-and-laundry-laundry-sticker-png.png" alt="Laundry Mart">
            <p class="brand-name">Laundry Mart</p>
        </div>

        <div class="right">
            <form action="">
                <h1>Hello Again!</h1>
                <h4>Welcome Back! we missed you</h4>

                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="test@example.com">
                </div>

                <div class="field">
                    <label for="pass">Password</label>
                    <input type="password" id="pass" required placeholder="Password">
                </div>

                <div class="forgot">
                    <a href="#">Forgot Password?</a>
                </div>

                <button>Login</button>

                <h4 class="register">Not A Member? <a href="#">Register Now</a></h4>
            </form>
        </div>
    </div>
</body>
</html>
