<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Ciao Restaurant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <div class="logo">
                    <h1>Bella Ciao</h1>
                    <span class="tagline">Dine Like You're On The Run</span>
                </div>
                <ul class="nav-links">
                    <li><a href="#home">The Vault</a></li>
                    <li><a href="#menu">The Loot</a></li>

                <div class="hero-btns">
                    <a href="#menu" class="btn-primary">Explore The Loot</a>
