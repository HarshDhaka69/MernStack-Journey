<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h2>Forms In HTML:</h2>
    <form action="">
        <label for="first">First Name: </label>
        <input type="text" id="first" minlength="5" maxlength="20" required />

        <br><br>
        <label for="last">Last Name: </label>
        <input type="text" id="last" minlength="5" maxlength="20"/>

        <br><br>
        <label for="">Age: </label>
        <input type="number"/>

        <br><br>
        <label for="">Email: </label>
        <input type="email"/>

        <br><br>
        <label for="">Date Of Joining: </label>
        <input type="date" />

        <br><br>
        <label for="">Password: </label>
        <input type="password" />

        <br><br>
        <p>Select Your Shirt Size </p>
        <input type="radio" id="small" name="shirtSize"/> <label for="small">Small Size</label>
        <input type="radio" id="medium" name="shirtSize"/> <label for="medium">Medium Size</label>
        <input type="radio" id="large" name="shirtSize"/> <label for="large">Large Size</label>

        <br><br>
        <label for="sizenumber">Please Select Your Size Number: </label>
        <select name="number" id="sizenumber">
            <option value=""></option>
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="40">40</option>
            <option value="50">50</option>
            <option value="60">60</option>
        </select>

        <br><br>
        <h3><label for="cmt">Please Provide Your Valuable Comment: </label></h3>
        <textarea name="cmt" id="cmt" rows="4" cols="40" placeholder="Please Enter Your Comment"></textarea>

        <br><br>
        <h3><p> Submit Your Response </p></h3>
        <input type="reset"/>
        <input type="submit"/>
    </form>
</body>
</html>
